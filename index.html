<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css" />
    <title>Document</title>
</head>

<body>
    <div class="app">
        <div class="topBar">
            <h1>To-Do List</h1>
            <div class="buttons">
                <div class="filterDropdown" id="filterDropdown">
                    <button id="filterToggle">
                        <img src="images/filter.png" alt="Filter" />
                    </button>
                    <div class="filterMenu" id="filterMenu">
                        <label><input type="radio" name="filter" value="all" checked /> All</label>
                        <label><input type="radio" name="filter" value="active" /> Active</label>
                        <label><input type="radio" name="filter" value="completed" /> Completed</label>
                    </div>
                </div>
                <button id="themeButton">
                    <img src="images/darkMode.png" alt="Theme Button" />
                </button>
            </div>
        </div>

        <div class="inputRow">
            <input type="text" id="taskInput" placeholder="Enter a task for today" />
            <button id="addButton">Add</button>
        </div>

        <div class="taskCounter">
            <span id="totalCount">Total: 0</span>
            <span id="activeCount">Active: 0</span>
            <span id="completedCount">Completed: 0</span>
        </div>
    </div>

    <div class="tasksDiv">
        <ul id="tasksList"></ul>
    </div>

    <div class="emptyState" id="emptyState">No tasks yet</div>

    <div class="toast" id="toast">
        <p id="toastMessage"></p>
        <div class="toastButtons">
            <button class="toastYes" id="toastYes">Yes</button>
            <button class="toastNo" id="toastNo">No</button>
        </div>
    </div>

    <div id="overlay" class="overlay"></div>

    <script src="script.js"></script>
</body>

</html>
